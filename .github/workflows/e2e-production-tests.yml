name: Run e2e production tests in docker compose

on: [push, pull_request, workflow_dispatch]

jobs:
  playwright-e2e-tests:
    name: 'Run Playwright Tests'
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.51.0-noble
      options: --user root

    steps:
      - name: Install Docker Compose
        run: |
          apt-get update && apt-get install -y docker-compose python3-distlib python3-distutils-extra

      - name: Switch to normal user
        run: su - pwuser -c "docker-compose --version"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Docker Compose version
        run: docker-compose --version

      - name: Build Docker Compose Images
        run: docker compose -f docker-compose.test.yml build

      - name: Run Docker Compose
        run: docker compose -f docker-compose.test.yml up -d

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        run: npx playwright test -x -c playwright.config.docker.ts
